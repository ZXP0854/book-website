<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<title>版权声明 - 图书推荐网站</title>
	<style>
	*{
		padding: 0;
		margin: 0;
	}
	div{
		box-sizing:border-box;
	}
	#container{
		width: 900px;
		margin: 0 auto;
		font-family: "微软雅黑", Arial;
	}
	#header{
		width: 100%;
		height: 150px;
		background: url('图片素材/bookbanner.jpg') no-repeat center center;
		background-size: contain;
	}
	#content{
		width: 100%;
		background-color: #f5f5f5;
		min-height: 400px;
	}
	.main-content{
		width: 100%;
		padding: 40px;
		background-color: #fff;
		text-align: center;
	}
	.developer-avatar{
		width: 120px;
		height: 120px;
		border-radius: 50%;
		overflow: hidden;
		margin: 0 auto 30px;
		border: 4px solid #ff6600;
	}
	.developer-avatar img{
		width: 100%;
		height: 100%;
		object-fit: cover;
	}
	.developer-info{
		text-align: center;
	}
	.developer-info h2{
		font-family: "黑体", "微软雅黑", Arial;
		font-weight: bold;
		font-size: 28px;
		color: #333;
		margin-bottom: 20px;
	}
	.developer-info p{
		font-size: 16px;
		color: #555;
		line-height: 2;
	}
	.back-link{
		display: inline-block;
		margin-top: 30px;
		padding: 10px 30px;
		background-color: #ff6600;
		color: #fff;
		text-decoration: none;
		border-radius: 5px;
		transition: all 0.3s;
	}
	.back-link:hover{
		background-color: #e55b00;
	}
	#footer{
		width: 100%;
		height: 80px;
		background-color: #333;
		clear: both;
		text-align: center;
		color: #fff;
		line-height: 80px;
	}
	#footer a{
		color: #ff6600;
		text-decoration: none;
	}
	#footer a:hover{
		text-decoration: underline;
	}
	</style>
</head>
<body>
<div id="container">
	<div id="header"></div>
	<div id="content">
		<div class="main-content">
			<div class="developer-avatar">
				<img src="头像.png" alt="开发者头像">
			</div>
			<div class="developer-info">
				<h2>王五</h2>
				<p>职业：前端开发工程师</p>
				<p>联系电话：1006811</p>
				<p>邮箱：666666@qq.com</p>
			</div>
			<a href="index.html" class="back-link">返回首页</a>
		</div>
	</div>
	<div id="footer">
		版权所有 &copy; 2024 图书推荐网站 | <a href="copyright.html">版权声明</a>
	</div>
</div>
</body>
</html>
